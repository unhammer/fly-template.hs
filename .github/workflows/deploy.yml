---

name: "Build and deploy to fly.io"
on:
  push:
    branches:
      - deploy
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  build:

    permissions:
      contents: read
      # minimal permissions needed for checkout
      # https://github.com/actions/upload-artifact/issues/197#issuecomment-3154708082

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false  # for security

      - uses: cachix/install-nix-action@29bd9290ef037a3ecbdafe83cbd2185e9dd0fa0a  # v20
        with:
          nix_path: nixpkgs=channel:nixos-22.05

      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be  # v1.5
      - run: docker load < $(nix-build ./docker.nix --option sandbox false)
      # "myapp:latest" must match the docker.nix name + tag here:
      - run: flyctl deploy --local-only -i myapp:latest
